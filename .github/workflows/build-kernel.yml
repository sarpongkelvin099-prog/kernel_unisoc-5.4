name: Build Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          ref: master
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git make flex bison bc libssl-dev \
            python3 device-tree-compiler libncurses-dev ccache \
            build-essential libelf-dev

      - name: Build kernel
        timeout-minutes: 80
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-

          # Load base defconfig
          make O=out ARCH=arm64 sprd_qogirl6_defconfig

          # Disable LTO to prevent multi-hour link times on runner
          ./scripts/config --file out/.config \
            -d LTO_CLANG \
            -d THINLTO \
            -d LTO_CLANG_FULL \
            -d CFI_CLANG
          make O=out ARCH=arm64 olddefconfig

          # Build with explicit parallelism
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-Image
          path: out/arch/arm64/boot/Image*
